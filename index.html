<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Height Control Game</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --lineRef: #f59e0b;
      --lineHeight: #38bdf8;
      --lineU: #a78bfa;
      --lineUff: #22c55e;
      --linePid: #ef4444;
      --grid: rgba(148, 163, 184, 0.14);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 6px;
      padding: 6px;
      overflow: hidden;
    }

    .bar, .stats, .panel {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 12px;
      min-width: 0;
    }

    .bar {
      padding: 6px 8px;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr 1.2fr 1.6fr;
      gap: 8px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      min-width: 0;
      align-items: center;
    }

    .group.pid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field {
      min-width: 0;
    }

    .field label {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 2px;
      font-size: 0.64rem;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .field .v {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    select, input[type="number"], button {
      width: 100%;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: var(--panel2);
      color: var(--text);
      font-size: 0.78rem;
      padding: 0 8px;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      height: 18px;
    }

    button {
      cursor: pointer;
      border: none;
      background: linear-gradient(180deg, #1d4ed8, #1e40af);
      font-weight: 700;
    }

    button.secondary {
      background: linear-gradient(180deg, #374151, #1f2937);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .stats {
      padding: 5px 8px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .stat {
      min-width: 0;
    }

    .stat .name {
      font-size: 0.60rem;
      color: var(--muted);
      margin-bottom: 1px;
    }

    .stat .value {
      font-size: 0.92rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mode-manual { color: #f59e0b; }
    .mode-pid { color: #22c55e; }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 0.92fr 1.35fr;
      gap: 6px;
      overflow: hidden;
    }

    .panel {
      padding: 6px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
      overflow: hidden;
    }

    .title {
      font-size: 0.72rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .canvas-wrap {
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 10px;
      background: linear-gradient(180deg, #0b1324 0%, #0f172a 55%, #111827 100%);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
      font-size: 0.64rem;
      color: #cbd5e1;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .swatch {
      width: 12px;
      height: 3px;
      border-radius: 999px;
      display: inline-block;
    }

    @media (max-width: 1180px) {
      .bar {
        grid-template-columns: 1fr 1fr;
      }
      .group.pid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .app {
        grid-template-rows: auto auto 1fr;
      }
      .bar {
        grid-template-columns: 1fr;
      }
      .group, .group.pid, .buttons, .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bar">
      <div class="brand">
        <h1>Drone Height Control Game</h1>
      </div>

      <div class="group">
        <div class="field">
          <label for="modeSelect"><span>Mode</span></label>
          <select id="modeSelect">
            <option value="manual">Manual</option>
            <option value="pid">PID + FF</option>
          </select>
        </div>
        <div class="field">
          <label for="refSelect"><span>Reference</span></label>
          <select id="refSelect">
            <option value="steps">Steps</option>
            <option value="sine">Sine</option>
            <option value="challenge">Challenge</option>
          </select>
        </div>
        <div class="field">
          <label for="simDuration"><span>T [s]</span></label>
          <input id="simDuration" type="number" min="10" max="120" step="1" value="60" />
        </div>
        <div class="field">
          <label for="timeScale"><span>Speed</span></label>
          <input id="timeScale" type="number" min="0.25" max="4" step="0.25" value="1" />
        </div>
      </div>

      <div class="group">
        <div class="field">
          <label for="manualThrottle"><span>Manual u</span><span class="v" id="manualThrottleVal">9.81</span></label>
          <input id="manualThrottle" type="range" min="0" max="20" step="0.01" value="9.81" />
        </div>
        <div class="field">
          <label for="ffGain"><span>FF</span><span class="v" id="ffGainVal">1.0</span></label>
          <input id="ffGain" type="range" min="0" max="20" step="0.01" value="1.00" />
        </div>
        <div class="buttons" style="grid-column: 1 / -1;">
          <button id="startBtn">Start</button>
          <button id="pauseBtn" class="secondary">Pause</button>
          
          <button id="fullscreenBtn" class="secondary">Fullscreen</button>
        </div>
      </div>

      <div class="group pid">
        <div class="field">
          <label for="K"><span>K</span><span class="v" id="KVal">1.00</span></label>
          <input id="K" type="range" min="0" max="10" step="0.01" value="1.0" />
        </div>
        <div class="field">
          <label for="Ti"><span>Ti</span><span class="v" id="TiVal">1.00</span></label>
          <input id="Ti" type="range" min="0.2" max="10" step="0.01" value="1.00" />
        </div>
        <div class="field">
          <label for="Td"><span>Td</span><span class="v" id="TdVal">1.00</span></label>
          <input id="Td" type="range" min="0" max="4" step="0.01" value="1.00" />
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="name">Score</div>
        <div class="value" id="scoreVal">1000</div>
      </div>
      <div class="stat">
        <div class="name">Mode</div>
        <div class="value" id="modeVal">Manual</div>
      </div>
      <div class="stat">
        <div class="name">Height / Ref</div>
        <div class="value" id="heightVal">0.00 / 0.00</div>
      </div>
      <div class="stat">
        <div class="name">Mass / k</div>
        <div class="value" id="plantVal">1.00 / 1.00</div>
      </div>
    </div>

    <div class="main">
      <div class="panel">
        <div class="title">Drone</div>
        <div class="canvas-wrap"><canvas id="droneCanvas"></canvas></div>
      </div>

      <div class="panel">
        <div class="title">Plots</div>
        <div class="canvas-wrap"><canvas id="plotCanvas"></canvas></div>
        <div class="legend">
          <span><i class="swatch" style="background: var(--lineRef);"></i>ref</span>
          <span><i class="swatch" style="background: var(--lineHeight);"></i>height</span>
          <span><i class="swatch" style="background: var(--lineU);"></i>u</span>
          <span><i class="swatch" style="background: var(--lineUff);"></i>ff</span>
          <span><i class="swatch" style="background: var(--linePid);"></i>pid</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const g = 9.81;

    const ui = {
      fullscreenBtn: document.getElementById('fullscreenBtn'),
      modeSelect: document.getElementById('modeSelect'),
      refSelect: document.getElementById('refSelect'),
      simDuration: document.getElementById('simDuration'),
      timeScale: document.getElementById('timeScale'),
      startBtn: document.getElementById('startBtn'),
      pauseBtn: document.getElementById('pauseBtn'),
    
      manualThrottle: document.getElementById('manualThrottle'),
      ffGain: document.getElementById('ffGain'),
      K: document.getElementById('K'),
      Ti: document.getElementById('Ti'),
      Td: document.getElementById('Td'),
      manualThrottleVal: document.getElementById('manualThrottleVal'),
      ffGainVal: document.getElementById('ffGainVal'),
      KVal: document.getElementById('KVal'),
      TiVal: document.getElementById('TiVal'),
      TdVal: document.getElementById('TdVal'),
      scoreVal: document.getElementById('scoreVal'),
      modeVal: document.getElementById('modeVal'),
      heightVal: document.getElementById('heightVal'),
      plantVal: document.getElementById('plantVal'),
      droneCanvas: document.getElementById('droneCanvas'),
      plotCanvas: document.getElementById('plotCanvas'),
    };

    const droneCtx = ui.droneCanvas.getContext('2d');
    const plotCtx = ui.plotCanvas.getContext('2d');

    const state = {
      running: false,
      paused: false,
      ended: false,

      t: 0,
      x: 0,
      v: 0,

      eInt: 0,
      prevE: 0,

      // NEW controller states:
      prevX: 0,   // previous measured height
      dFilt: 0,   // filtered derivative signal

      scoreRaw: 0,
      lastRealTime: 0,

      keys: { up: false, down: false },
      history: [],
      cargoDropped: false,
      lastU: 0
    };

    const plant = {
      m0: 1.0,
      k0: 1.0,
      fadeRate: 0.005,
      cargoDropTime: 45,
      cargoDropFraction: 0.30,
      floor: 0,
      ceiling: 12,
    };

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function fmt(x, digits = 2) {
      return Number(x).toFixed(digits);
    }

    function currentMode() {
      return ui.modeSelect.value;
    }

    function getParams() {
      return {
        K: parseFloat(ui.K.value),
        Ti: parseFloat(ui.Ti.value),
        Td: parseFloat(ui.Td.value),
        uff: parseFloat(ui.ffGain.value),
        manual: parseFloat(ui.manualThrottle.value),
        duration: parseFloat(ui.simDuration.value),
        timeScale: parseFloat(ui.timeScale.value),
        sat: 18
      };
    }

    function updateLabels() {
      ui.manualThrottleVal.textContent = fmt(ui.manualThrottle.value, 2);
      ui.ffGainVal.textContent = fmt(ui.ffGain.value, 2);
      ui.KVal.textContent = fmt(ui.K.value, 2);
      ui.TiVal.textContent = fmt(ui.Ti.value, 2);
      ui.TdVal.textContent = fmt(ui.Td.value, 2);

      ui.modeVal.textContent = currentMode() === 'manual' ? 'Manual' : 'PID + FF';
      ui.modeVal.className = 'value ' + (currentMode() === 'manual' ? 'mode-manual' : 'mode-pid');
    }

    function kOfT(t) {
      return Math.max(0.68, plant.k0 - plant.fadeRate * t);
    }

    function mOfT(t) {
      return t >= plant.cargoDropTime ? plant.m0 * (1 - plant.cargoDropFraction) : plant.m0;
    }

    function reference(t) {
      const type = ui.refSelect.value;
      if (type === 'steps') {
        if (t < 4) return 1.2;
        if (t < 10) return 4.5;
        if (t < 18) return 2.5;
        if (t < 27) return 6.2;
        if (t < 34) return 3.5;
        return 5.0;
      }
      if (type === 'sine') {
        return 4 + 2.2 * Math.sin(0.42 * t) + 0.6 * Math.sin(1.2 * t + 0.8);
      }
      return 1.6 + 0.12 * t + 1.2 * Math.sin(0.7 * t) + (t > 20 ? 1.3 : 0) - (t > 30 ? 1.0 : 0);
    }

    function startSimulation() {
      state.running = true;
      state.paused = false;
      state.ended = false;
      state.t = 0;
      state.x = 0;
      state.v = 0;
      state.eInt = 0;
      state.prevE = 0;

      state.prevX = 0;
      state.dFilt = 0;
      state.scoreRaw = 0;
      state.history = [];
      state.cargoDropped = false;
      state.lastU = 0;
      state.lastRealTime = performance.now();
      ui.pauseBtn.textContent = 'Pause';
      pushHistory(0, 0, reference(0), 0, 0, 0, mOfT(0), kOfT(0));
      renderAll();
    }

    function endSimulation() {
      state.running = false;
      state.ended = true;
      renderAll();
    }

    function pushHistory(t, x, r, u, uff, upid, m, k) {
      state.history.push({ t, x, r, u, uff, upid, m, k });
      if (state.history.length > 10000) state.history.shift();
    }

    function computeControl(dt) {
      const p = getParams();
      const r = reference(state.t);
      const e = r - state.x;
      let u = 0, uff = 0, upid = 0;

      if (currentMode() === 'manual') {
        u = p.manual;
      } else {
        uff = p.uff;

        // Derivative on measurement, not on error
        const dy = dt > 0 ? (state.x - state.prevX) / dt : 0;

        // Low-pass filter on derivative
        const tauD = 0.30;
        const alphaD = dt / (tauD + dt);
        state.dFilt += alphaD * (dy - state.dFilt);

        const iCandidate = state.eInt + e * dt;

        const pidCandidate =
          p.K * (
            e +
            (p.Ti > 1e-6 ? iCandidate / p.Ti : 0) -
            p.Td * state.dFilt
          );

        let uUnsat = uff + pidCandidate;
        u = clamp(uUnsat, 0, p.sat);

        // Anti-windup: only integrate when saturation is not made worse
        if (Math.abs(u - uUnsat) < 1e-8 || Math.sign(e) !== Math.sign(uUnsat - u)) {
          state.eInt = iCandidate;
        }

        upid =
          p.K * (
            e +
            (p.Ti > 1e-6 ? state.eInt / p.Ti : 0) -
            p.Td * state.dFilt
          );

        u = clamp(uff + upid, 0, p.sat);
      }

      state.prevE = e;
      state.prevX = state.x;

      return { u, uff, upid, r, e };
    }

    function stepSim(dt) {
      const { u, uff, upid, r, e } = computeControl(dt);
      const k = kOfT(state.t);
      const m = mOfT(state.t);
      const a = k * u - m * g;

      state.v += a * dt;
      state.x += state.v * dt;

      if (state.x < plant.floor) {
        state.x = plant.floor;
        if (state.v < 0) state.v = 0;
      }
      if (state.x > plant.ceiling) {
        state.x = plant.ceiling;
        if (state.v > 0) state.v = 0;
      }

      const du = dt > 0 ? (u - state.lastU) / dt : 0;
      state.scoreRaw += (1.3 * e * e ) * dt;
      state.lastU = u;
      state.t += dt;

      if (!state.cargoDropped && state.t >= plant.cargoDropTime) {
        state.cargoDropped = true;
      }

      pushHistory(state.t, state.x, r, u, uff, upid, m, k);

      if (state.t >= getParams().duration) {
        endSimulation();
      }
    }

    function scoreValue() {
      const duration = Math.max(1, getParams().duration);
      const s = 1000 - 42 * state.scoreRaw / duration;
      return Math.max(0, Math.round(s));
    }

    function resizeCanvasToDisplaySize(canvas) {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(1, Math.round(rect.width * dpr));
      const height = Math.max(1, Math.round(rect.height * dpr));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
      }
    }

    function drawCloud(ctx, x, y, r) {
      ctx.beginPath();
      ctx.arc(x, y, r * 0.7, 0, Math.PI * 2);
      ctx.arc(x + r * 0.7, y - 6, r * 0.9, 0, Math.PI * 2);
      ctx.arc(x + r * 1.5, y, r * 0.75, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBackgroundSky(ctx, w, h) {
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#0b1324');
      grad.addColorStop(0.62, '#10203d');
      grad.addColorStop(1, '#0f172a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      for (let i = 0; i < 4; i++) {
        drawCloud(ctx, 70 + i * (w * 0.22), 45 + (i % 2) * 50, 24);
      }

      ctx.fillStyle = '#0b1220';
      ctx.fillRect(0, h - 32, w, 32);
    }

    function roundRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function drawRotor(ctx, x, y, t, throttle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(-14, -5);
      ctx.lineTo(-14, 5);
      ctx.moveTo(14, -5);
      ctx.lineTo(14, 5);
      ctx.stroke();

      const spin = t * (12 + throttle * 1.4);
      ctx.strokeStyle = `rgba(226,232,240,${0.18 + 0.5 * clamp(throttle / 18, 0, 1)})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-18 * Math.cos(spin), -3 * Math.sin(spin));
      ctx.lineTo(18 * Math.cos(spin), 3 * Math.sin(spin));
      ctx.stroke();
      ctx.restore();
    }

    function drawDrone() {
      resizeCanvasToDisplaySize(ui.droneCanvas);
      const rect = ui.droneCanvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      const ctx = droneCtx;
      ctx.clearRect(0, 0, w, h);
      drawBackgroundSky(ctx, w, h);

      const marginTop = 20;
      const marginBottom = 42;
      const usable = Math.max(20, h - marginTop - marginBottom);
      const yDrone = h - marginBottom - (state.x / plant.ceiling) * usable;
      const xCenter = w * 0.52;

      const r = reference(state.t);
      const yRef = h - marginBottom - (r / plant.ceiling) * usable;
      ctx.strokeStyle = 'rgba(245, 158, 11, 0.9)';
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(16, yRef);
      ctx.lineTo(w - 16, yRef);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.strokeStyle = 'rgba(148,163,184,0.30)';
      ctx.beginPath();
      ctx.moveTo(24, marginTop);
      ctx.lineTo(24, h - marginBottom);
      ctx.stroke();

      ctx.fillStyle = 'rgba(226,232,240,0.8)';
      ctx.font = '11px sans-serif';
      for (let i = 0; i <= 4; i++) {
        const val = (plant.ceiling / 4) * i;
        const yy = h - marginBottom - (val / plant.ceiling) * usable;
        ctx.beginPath();
        ctx.moveTo(20, yy);
        ctx.lineTo(28, yy);
        ctx.stroke();
        ctx.fillText(val.toFixed(0), 34, yy + 4);
      }

      ctx.fillStyle = 'rgba(15, 23, 42, 0.42)';
      ctx.beginPath();
      ctx.ellipse(xCenter, h - 20, 70 - 28 * (state.x / plant.ceiling), 8, 0, 0, Math.PI * 2);
      ctx.fill();

      const throttle = state.history.length ? state.history[state.history.length - 1].u : 0;
      const washAlpha = clamp(throttle / 18, 0.08, 0.9);
      const washLen = 30 + 55 * washAlpha;
      const washSpread = 18 + 15 * washAlpha;
      const grad = ctx.createLinearGradient(0, yDrone + 18, 0, yDrone + 18 + washLen);
      grad.addColorStop(0, `rgba(56,189,248,${0.14 * washAlpha})`);
      grad.addColorStop(1, 'rgba(56,189,248,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(xCenter - washSpread, yDrone + 18);
      ctx.lineTo(xCenter + washSpread, yDrone + 18);
      ctx.lineTo(xCenter + washSpread * 0.45, yDrone + 18 + washLen);
      ctx.lineTo(xCenter - washSpread * 0.45, yDrone + 18 + washLen);
      ctx.closePath();
      ctx.fill();

      const bob = 0 * 2* Math.sin(14 * state.t);
      const tilt = 0 * clamp(-state.v * 0.03, -0.12, 0.12);
      ctx.save();
      ctx.translate(xCenter, yDrone + bob);
      ctx.rotate(tilt);

      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(-42, 0);
      ctx.lineTo(42, 0);
      ctx.stroke();

      ctx.fillStyle = '#94a3b8';
      ctx.fillRect(-12, -9, 24, 18);
      ctx.fillStyle = '#38bdf8';
      ctx.fillRect(-6, -5, 12, 8);

      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-14, 9);
      ctx.lineTo(-20, 17);
      ctx.moveTo(14, 9);
      ctx.lineTo(20, 17);
      ctx.moveTo(-26, 18);
      ctx.lineTo(-8, 18);
      ctx.moveTo(8, 18);
      ctx.lineTo(26, 18);
      ctx.stroke();

      drawRotor(ctx, -34, 0, state.t, throttle);
      drawRotor(ctx, 34, 0, state.t + 0.4, throttle);
      ctx.restore();

      ctx.fillStyle = 'rgba(15,23,42,0.74)';
      roundRect(ctx, w - 116, 10, 104, 58, 10, true, false);
      ctx.fillStyle = '#e2e8f0';
      ctx.font = '11px sans-serif';
      ctx.fillText(`t ${fmt(state.t, 1)} s`, w - 104, 28);
      ctx.fillText(`x ${fmt(state.x, 2)} m`, w - 104, 43);
      ctx.fillText(`v ${fmt(state.v, 2)}`, w - 104, 58);
    }

    function getCss(varName) {
      return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    function polyline(ctx, data, fx, fy, stroke, width) {
      ctx.beginPath();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = width;
      data.forEach((d, i) => {
        const x = fx(d), y = fy(d);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    function drawPlotBox(ctx, box, ylabel, ymin, ymax) {
      ctx.fillStyle = 'rgba(15,23,42,0.72)';
      roundRect(ctx, box.x, box.y, box.w, box.h, 10, true, false);
      ctx.strokeStyle = 'rgba(148,163,184,0.20)';
      ctx.lineWidth = 1;
      roundRect(ctx, box.x, box.y, box.w, box.h, 10, false, true);

      ctx.font = '11px sans-serif';
      ctx.fillStyle = '#e2e8f0';
      ctx.fillText(ylabel, box.x + 8, box.y + 14);

      const nGridY = 4;
      for (let i = 0; i <= nGridY; i++) {
        const frac = i / nGridY;
        const y = box.y + frac * box.h;
        ctx.strokeStyle = getCss('--grid');
        ctx.beginPath();
        ctx.moveTo(box.x, y);
        ctx.lineTo(box.x + box.w, y);
        ctx.stroke();

        const val = ymax - frac * (ymax - ymin);
        ctx.fillStyle = '#94a3b8';
        ctx.fillText(val.toFixed(1), 6, y + 4);
      }

      const T = Math.max(parseFloat(ui.simDuration.value), 1);
      const nGridX = 6;
      for (let i = 0; i <= nGridX; i++) {
        const frac = i / nGridX;
        const x = box.x + frac * box.w;
        ctx.strokeStyle = getCss('--grid');
        ctx.beginPath();
        ctx.moveTo(x, box.y);
        ctx.lineTo(x, box.y + box.h);
        ctx.stroke();

        const val = frac * T;
        ctx.fillStyle = '#94a3b8';
        ctx.fillText(val.toFixed(0), x - 5, box.y + box.h + 14);
      }
    }

    function drawPlots() {
      resizeCanvasToDisplaySize(ui.plotCanvas);
      const rect = ui.plotCanvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      const ctx = plotCtx;
      ctx.clearRect(0, 0, w, h);

      const m = { l: 42, r: 12, t: 18, b: 30, gap: 20 };
      const subplotH = (h - m.t - m.b - m.gap) / 2;
      const topBox = { x: m.l, y: m.t, w: w - m.l - m.r, h: subplotH };
      const botBox = { x: m.l, y: m.t + subplotH + m.gap, w: w - m.l - m.r, h: subplotH };

      drawPlotBox(ctx, topBox, 'height [m]', 0, plant.ceiling);
      const uMax = 20;

      drawPlotBox(ctx, botBox, 'u', 0, uMax);

      const T = Math.max(parseFloat(ui.simDuration.value), 1);
      const xTime = t => topBox.x + (t / T) * topBox.w;
      const yTop = y => topBox.y + topBox.h - (y / plant.ceiling) * topBox.h;
      const yBot = y => botBox.y + botBox.h - (y / uMax) * botBox.h;
      const xDrop = xTime(Math.min(plant.cargoDropTime, T));
      ctx.strokeStyle = 'rgba(34,197,94,0.7)';
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(xDrop, topBox.y);
      ctx.lineTo(xDrop, botBox.y + botBox.h);
      ctx.stroke();
      ctx.setLineDash([]);

      if (state.history.length < 2) return;
      polyline(ctx, state.history, d => xTime(d.t), d => yTop(d.r), getCss('--lineRef'), 1.8);
      polyline(ctx, state.history, d => xTime(d.t), d => yTop(d.x), getCss('--lineHeight'), 2.3);
      polyline(ctx, state.history, d => xTime(d.t), d => yBot(d.u), getCss('--lineU'), 2.0);
      polyline(ctx, state.history, d => xTime(d.t), d => yBot(d.uff), getCss('--lineUff'), 1.2);
      polyline(ctx, state.history, d => xTime(d.t), d => yBot(Math.max(0, d.upid)), getCss('--linePid'), 1.2);
    }

    function updateStats() {
      ui.scoreVal.textContent = String(scoreValue());
      ui.heightVal.textContent = `${fmt(state.x, 2)} / ${fmt(reference(state.t), 2)}`;
      ui.plantVal.textContent = `${fmt(mOfT(state.t), 2)} / ${fmt(kOfT(state.t), 2)}`;
    }

    function renderAll() {
      updateLabels();
      updateStats();
      drawDrone();
      drawPlots();
    }

    function animate(now) {
      requestAnimationFrame(animate);
      if (!state.running || state.paused) {
        renderAll();
        state.lastRealTime = now;
        return;
      }

      const p = getParams();
      let dtReal = (now - state.lastRealTime) / 1000;
      state.lastRealTime = now;
      dtReal = clamp(dtReal, 0, 0.04);
      let dtSimTotal = dtReal * p.timeScale;

      const dtMax = 0.025;
      while (dtSimTotal > 0) {
        const dt = Math.min(dtMax, dtSimTotal);
        stepSim(dt);
        dtSimTotal -= dt;
        if (!state.running) break;
      }

      renderAll();
    }

    function bindEvents() {
      ui.fullscreenBtn.addEventListener('click', async () => {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
          setTimeout(renderAll, 50);
        } catch (err) {
          console.warn('Fullscreen request failed:', err);
        }
      });

      document.addEventListener('fullscreenchange', () => {
        ui.fullscreenBtn.textContent = document.fullscreenElement ? 'Exit fullscreen' : 'Fullscreen';
        setTimeout(renderAll, 50);
      });

      [ui.manualThrottle, ui.ffGain, ui.K, ui.Ti, ui.Td].forEach(el => {
        el.addEventListener('input', updateLabels);
      });
      ui.modeSelect.addEventListener('change', updateLabels);
      ui.startBtn.addEventListener('click', startSimulation);
      ui.pauseBtn.addEventListener('click', () => {
        if (!state.running && !state.ended) return;
        if (state.ended) {
          startSimulation();
          return;
        }
        state.paused = !state.paused;
        ui.pauseBtn.textContent = state.paused ? 'Resume' : 'Pause';
      });
      window.addEventListener('keydown', e => {
        if (e.shiftKey && e.key.toLowerCase() === 'p') {
          ui.ffGain.value = '9';
          ui.K.value = '3.4';
          ui.Ti.value = '3';
          ui.Td.value = '0.75';
          ui.modeSelect.value = 'pid';
          updateLabels();
          renderAll();
        }
      });

      window.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
          state.keys.up = true;
          e.preventDefault();
        }
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
          state.keys.down = true;
          e.preventDefault();
        }
        if (e.key === ' ') {
          if (state.running) {
            state.paused = !state.paused;
            ui.pauseBtn.textContent = state.paused ? 'Resume' : 'Pause';
          }
          e.preventDefault();
        }
      });

      window.addEventListener('keyup', e => {
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') state.keys.up = false;
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') state.keys.down = false;
      });

      window.addEventListener('resize', renderAll);
      window.addEventListener('orientationchange', renderAll);

      setInterval(() => {
        if (currentMode() !== 'manual') return;
        let val = parseFloat(ui.manualThrottle.value);
        if (state.keys.up) val += 0.10;
        if (state.keys.down) val -= 0.10;
        val = clamp(val, 0, 20);
        ui.manualThrottle.value = String(val);
        updateLabels();
      }, 30);
    }

    bindEvents();
    updateLabels();
    renderAll();
    requestAnimationFrame((t) => {
      state.lastRealTime = t;
      requestAnimationFrame(animate);
    });
  </script>
</body>
</html>
